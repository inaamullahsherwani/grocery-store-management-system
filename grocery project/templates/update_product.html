<!DOCTYPE html>
<html>
<head>
    <title>Update Product</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Update Product</h1>
    <form method="POST">
        <label>Name:</label><br>
        <input type="text" name="name" value="{{ product[1] }}" required><br><br>

        <label>Category:</label><br>
        <input type="text" name="category" value="{{ product[2] }}" required><br><br>

        <label>Price:</label><br>
        <input type="number" name="price" step="0.01" value="{{ product[3] }}" required><br><br>

        <label>Stock Quantity:</label><br>
        <input type="number" name="stock" value="{{ product[4] }}" required><br><br>

        <label>Expiry Date:</label><br>
        <input type="date" name="expiry" value="{{ product[5] }}" required><br><br>

        <button type="submit">Update Product</button>
    </form>
    <br>
    <a href="/"><button type="button">Back to Home</button></a>
</body>
</html>
